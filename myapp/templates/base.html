{% load static %}
<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Transjakarta Route Optimizaer{% endblock %}</title>

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- Leaflet -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <!-- Custom CSS -->
        <link rel="stylesheet" href="{% static 'css/customstyle.css' %}" />
    </head>
    <body>
        <nav class="navbar shadow-sm py-3">
            <div class="container">
                <span class="navbar-brand fw-bold"
                    >Transjakarta Fleet Route Optimizer</span
                >
            </div>
        </nav>
        <main class="container my-4">
            {% block content %}{% endblock %}
        </main>
    </body>
    <footer class="text-center text-muted py-3 border-top mt-5">
        <small>Transjakarta Fleet Route Optimizer</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
